# ShopAgent Docker Compose
# Semana AI Data Engineer 2026 — Days 1-3 (100% local)
# Usage: cd gen && cp .env.example .env && docker compose up

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopagent}
      POSTGRES_USER: ${POSTGRES_USER:-shopagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopagent}
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopagent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  shadowtraffic:
    image: shadowtraffic/shadowtraffic:latest
    env_file: .env
    volumes:
      - ./shadowtraffic.json:/home/config.json
      - reviews_data:/data/reviews
    command: ["--config", "/home/config.json"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  reviews_data:
